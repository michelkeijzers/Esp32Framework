<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Status</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="custom.css">
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
         <span class="version-colored version-label">Version 0.1.0</span>
      </div>
      <div class="subtitle-row">
         <button onclick="window.location.href='index.html'" class="home-btn">Home</button>
         <h2 style="margin: 0;">Status</h2>
      </div>
      <div style="display: flex; justify-content: center; margin-top: 1.5rem;">
         <button id="refresh-btn"
            style="background: #1fa750; color: #fff; font-weight: bold; border-radius: 0.5rem; padding: 0.7rem 2.2rem; font-size: 1.1rem; border: none; box-shadow: 0 2px 8px #0002; cursor: pointer; transition: background 0.2s;">
            &#x21bb; Refresh
         </button>
      </div>
      <div id="nodes-container" style="display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; margin-top: 2.5rem;"></div>
      <script>
         function loadNodes() {
            fetch('/api/status')
               .then(response => response.json())
               .then(nodes => {
                  const container = document.getElementById('nodes-container');
                  container.innerHTML = '';
                  nodes.forEach((node, idx) => {
                     const statusClass = node.status_watchdog === 'OK' ? '' : 'status-error';
                     container.innerHTML += `
                              <div style="background: #000; color: #eee; border-radius: 1rem; padding: 1.5rem 2.5rem; min-width: 320px; min-height: 320px; box-shadow: 0 0 12px #000a; display: flex; flex-direction: column; gap: 1rem;">
                                 <h3 style=\"margin-top: 0; margin-bottom: 1.2rem; color: #fff;\">Node ${idx + 1}: ${node.name}</h3>
                                 <div><span style=\"font-weight: bold;\">Role:</span> <span>${node.role}</span></div>
                                 <div><span style=\"font-weight: bold;\">Slave sequence number:</span> <span>${node.slave_sequence}</span></div>
                                 <div><span style=\"font-weight: bold;\">Status (watchdog):</span> <span class=\"${statusClass}\">${node.status_watchdog}</span></div>
                                 <div><span style=\"font-weight: bold;\">Last communication:</span> <span>${node.last_communication}</span></div>
                                 <div><span style=\"font-weight: bold;\">Uptime:</span> <span>${node.uptime}</span></div>
                                 <div><span style=\"font-weight: bold;\">Firmware version:</span> <span>${node.firmware_version}</span></div>
                                 <div><span style=\"font-weight: bold;\">Configuration version:</span> <span>${node.config_version}</span></div>
                                 <div><span style=\"font-weight: bold;\">MAC address:</span> <span>${node.mac_address}</span></div>
                                 <div><span style=\"font-weight: bold;\">IP address:</span> <span>${node.ip_address}</span></div>
                              </div>
                           `;
                  });
               })
               .catch(err => {
                  document.getElementById('nodes-container').innerHTML = '<p style="color:red;">Failed to load node status.</p>';
               });
         }
         window.addEventListener('DOMContentLoaded', function () {
            loadNodes();
            document.getElementById('refresh-btn').addEventListener('click', function () {
               loadNodes();
            });
         });
      </script>
   </main>
</body>

</html>
