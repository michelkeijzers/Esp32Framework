<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Initialization</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="custom.css">
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
      </div>
      <div class="subtitle-row">
         <button onclick="window.location.href='index.html'" class="home-btn">Home</button>
         <h2 style="margin: 0;">Initialization</h2>
      </div>
      <div style="display: flex; justify-content: center; margin-top: 2.5rem;">
         <div class="init-pane"
            style="background: #111; color: #eee; border-radius: 1rem; padding: 2rem 2.5rem; min-width: 340px; box-shadow: 0 0 12px #000a; max-width: 500px;">
            <form id="nodes-form">
               <div style="margin-bottom:1.5rem;">
                  <label style="font-weight:bold;">Node IP Addresses:</label>
                  <div id="nodes-fields"></div>
               </div>
               <button type="submit"
                  style="background:#1fa750; color:#fff; font-weight:bold; border-radius:0.5rem; padding:0.7rem 2.2rem; font-size:1.1rem; border:none; box-shadow:0 2px 8px #0002; cursor:pointer;">Save</button>
               <button type="button" class="reset-btn"
                  style="background:#c00; color:#fff; font-weight:bold; border-radius:0.5rem; padding:0.7rem 2.2rem; font-size:1.1rem; border:none; box-shadow:0 2px 8px #0002; cursor:pointer; margin-top:2rem; margin-left:1rem;">Reset
                  System</button>
            </form>
            <script>
               window.addEventListener('DOMContentLoaded', function () {
                  fetch('/api/nodes_info')
                     .then(response => response.json())
                     .then(nodes => {
                        const fields = document.getElementById('nodes-fields');
                        fields.innerHTML = '';
                        nodes.forEach((node, idx) => {
                           fields.innerHTML += `
                                                      <div class="node-row" style="display:flex; align-items:center; margin-bottom:1rem;">
                                                         <span style="min-width:120px;">${node.name}:</span>
                                                         <input class="ip-input" type="text" name="node-ip-${idx}" value="${node.ip_address || ''}" placeholder="IP address" style="width:180px; margin-left:1rem;">
                                                      </div>
                                                   `;
                        });
                        // Attach submit handler after fields are rendered
                        document.getElementById('nodes-form').onsubmit = function (e) {
                           e.preventDefault();
                           const ipInputs = fields.querySelectorAll('input[type="text"]');
                           const ipAddresses = Array.from(ipInputs).map(input => input.value.trim());
                           const saveBtn = this.querySelector('button[type="submit"]');
                           const originalText = saveBtn.textContent;
                           const originalBg = saveBtn.style.background;
                           fetch('/api/nodes_info', {
                              method: 'POST',
                              headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify(ipAddresses)
                           }).then(resp => {
                              if (resp.ok) {
                                 saveBtn.textContent = 'Saved!';
                                 saveBtn.style.background = '#1fa750';
                                 setTimeout(() => {
                                    saveBtn.textContent = originalText;
                                    saveBtn.style.background = originalBg;
                                 }, 2000);
                              } else {
                                 saveBtn.textContent = 'Error!';
                                 saveBtn.style.background = '#c00';
                                 setTimeout(() => {
                                    saveBtn.textContent = originalText;
                                    saveBtn.style.background = originalBg;
                                 }, 2000);
                              }
                           }).catch(() => {
                              saveBtn.textContent = 'Error!';
                              saveBtn.style.background = '#c00';
                              setTimeout(() => {
                                 saveBtn.textContent = originalText;
                                 saveBtn.style.background = originalBg;
                              }, 2000);
                           });
                        };
                        // Attach click handler for Reset System button
                        const resetBtn = document.querySelector('.reset-btn');
                        if (resetBtn) {
                           resetBtn.addEventListener('click', function () {
                              if (window.confirm('Are you sure to reset the system?')) {
                                 fetch('/api/reset_system', { method: 'POST' });
                              }
                           });
                        }
                     })
                     .catch(() => {
                        document.getElementById('nodes-fields').innerHTML = '<span style="color:red;">Failed to load node info.</span>';
                     });
               });
            </script>
         </div>
      </div>
   </main>
</body>

</html>
