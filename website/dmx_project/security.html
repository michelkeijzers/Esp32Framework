<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Security</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="custom.css">
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
      </div>
      <div class="subtitle-row">
         <button onclick="window.location.href='index.html'" class="home-btn">Home</button>
         <h2 style="margin: 0;">Security</h2>
      </div>
      <div style="display: flex; justify-content: center; margin-top: 2.5rem;">
         <div class="security-pane"
            style="background: #111; color: #eee; border-radius: 1rem; padding: 2rem 2.5rem; min-width: 420px; box-shadow: 0 0 12px #000a; max-width: 650px;">
            <form id="espnow-key-form" autocomplete="off">
               <label style="font-weight:bold; margin-bottom:1rem; display:block;">ESP-NOW Security Key</label>
               <div id="key-fields" style="display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem;"></div>
               <button type="submit"
                  style="background:#1fa750; color:#fff; font-weight:bold; border-radius:0.5rem; padding:0.7rem 2.2rem; font-size:1.1rem; border:none; box-shadow:0 2px 8px #0002; cursor:pointer;">Send
                  Key</button>
            </form>
         </div>
      </div>
      <script>
         // Render 16 hex input fields in 4 rows of 4, each with a number
         const keyFields = document.getElementById('key-fields');
         for (let rowIdx = 0; rowIdx < 4; rowIdx++) {
            const row = document.createElement('div');
            row.style = 'display:flex; align-items:center; gap:1.2rem; margin-bottom:0.2rem;';
            for (let colIdx = 0; colIdx < 4; colIdx++) {
               const i = rowIdx * 4 + colIdx;
               const group = document.createElement('div');
               group.style = 'display:flex; align-items:center; gap:0.3rem;';
               const label = document.createElement('span');
               label.textContent = (i + 1).toString();
               label.style = 'width:1.5rem; text-align:right; color:#aaa; font-size:1.05rem;';
               const input = document.createElement('input');
               input.type = 'text';
               input.maxLength = 2;
               input.size = 2;
               input.autocomplete = 'off';
               input.inputMode = 'hexadecimal';
               input.pattern = '[0-9a-fA-F]{2}';
               input.style = 'width:4rem; text-align:center; background:#222; color:#fff; border:1px solid #444; border-radius:0.3rem; font-size:1.1rem;';
               input.placeholder = '00';
               input.addEventListener('input', function () {
                  // Only allow valid hex
                  this.value = this.value.replace(/[^0-9a-fA-F]/g, '').slice(0, 2);
               });
               group.appendChild(label);
               group.appendChild(input);
               row.appendChild(group);
            }
            keyFields.appendChild(row);
         }

         document.getElementById('espnow-key-form').onsubmit = function (e) {
            e.preventDefault();
            const inputs = keyFields.querySelectorAll('input');
            const key = Array.from(inputs).map(inp => inp.value.padStart(2, '0').toLowerCase());
            // Validate all fields are 2 hex digits
            if (!key.every(val => /^[0-9a-f]{2}$/.test(val))) {
               alert('Each key field must be 2 hex digits (00-ff).');
               return;
            }
            // Scramble the key order using the fixed permutation
            const scrambleOrder = [7, 2, 12, 0, 9, 5, 1, 14, 8, 3, 10, 6, 13, 11, 4, 15];
            const scrambledKey = scrambleOrder.map(i => key[i]);
            const sendBtn = this.querySelector('button[type="submit"]');
            const originalText = sendBtn.textContent;
            const originalBg = sendBtn.style.background;
            fetch('/api/esp_now_key', {
               method: 'POST',
               headers: { 'Content-Type': 'application/json' },
               body: JSON.stringify(scrambledKey)
            }).then(resp => {
               if (resp.ok) {
                  sendBtn.textContent = 'Sent OK!';
                  sendBtn.style.background = '#1fa750';
               } else {
                  sendBtn.textContent = 'Error!';
                  sendBtn.style.background = '#c00';
               }
               setTimeout(() => {
                  sendBtn.textContent = originalText;
                  sendBtn.style.background = originalBg;
               }, 2000);
            }).catch(() => {
               sendBtn.textContent = 'Error!';
               sendBtn.style.background = '#c00';
               setTimeout(() => {
                  sendBtn.textContent = originalText;
                  sendBtn.style.background = originalBg;
               }, 2000);
            });
         };
      </script>
   </main>
</body>

</html>
