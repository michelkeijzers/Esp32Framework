<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>DMX Control</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="custom.css">
   <script src="htmx.min.js"></script>
   <!-- No selection logic here; all selection is handled in the body script using pointerdown only -->
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
      </div>
      <div class="subtitle-row">
         <button onclick="window.location.href='index.html'" class="home-btn">Home</button>
         <h2 style="margin: 0;">Control</h2>
      </div>
         <div style="margin-bottom: 1.2rem;">
            <button id="blackout-btn" class="big-bold-btn selectable-btn"
               style="background-color: #222; color: #fff; width: 100%; max-width: 300px; margin: 0 auto; display: block; font-size: 1.3rem; font-weight: bold; margin-bottom: 1.2rem;">Blackout</button>
         </div>
         <div class="preset-grid" id="preset-grid" style="display: flex; flex-direction: column;"></div>
         <script>
            // Shared selection handler for both Blackout and preset buttons

            function handleSelect(e) {
               document.querySelectorAll('.selectable-btn').forEach(btn => btn.classList.remove('selected-btn'));
               e.currentTarget.classList.add('selected-btn');
            }

            // Blackout button logic
            const blackoutBtn = document.getElementById('blackout-btn');
            blackoutBtn.addEventListener('pointerdown', function (e) {
               handleSelect(e);
            });
            blackoutBtn.addEventListener('click', function (e) {
               // Optionally, send blackout action to backend here
               if (window.htmx) {
                  htmx.ajax('POST', '/api/blackout', { target: '#preset-grid' });
               }
            });

                     // Render active presets 4 per row
                     function renderActivePresets(presetNumbers) {
                        const grid = document.getElementById('preset-grid');
                        grid.innerHTML = '';
                        let rowDiv = null;
                        presetNumbers.forEach((num, idx) => {
                           if (idx % 4 === 0) {
                              rowDiv = document.createElement('div');
                              rowDiv.style.display = 'flex';
                              rowDiv.style.gap = '1rem';
                              rowDiv.style.marginBottom = '0.7rem';
                              grid.appendChild(rowDiv);
                           }
                           const btn = document.createElement('button');
                           btn.className = 'big-bold-btn preset-btn selectable-btn';
                           btn.textContent = num;
                           btn.setAttribute('hx-post', `/api/select_preset/${num}`);
                           btn.setAttribute('hx-swap', 'none');
                           btn.style.flex = '1';
                           btn.addEventListener('pointerdown', handleSelect);
                           rowDiv.appendChild(btn);
                           if (window.htmx && typeof htmx.process === 'function') htmx.process(btn);
                        });
                     }
                     fetch('/api/active_preset_numbers')
                        .then(r => r.json())
                        .then(renderActivePresets)
                        .catch(() => {
                           // Fallback: show nothing if endpoint fails
                        });
                  </script>
